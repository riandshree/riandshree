<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ri & Shree</title>
  <meta name="description" content="Independent multi-genre music. Listen to Aaye Re Piya — streaming now." />
  <meta property="og:title" content="Ri & Shree" />
  <meta property="og:description" content="We ran away to Udaipur. A song found us instead." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* pulled directly from the photo */
      --dark:       #130d0b;
      --burgundy:   #562B25;
      --terra:      #8A593D;
      --copper:     #C89567;
      --copper-lt:  #DBCEC3;
      --cool-slate: #6D778C;
      --cream:      #EDE0D4;
      --muted:      #A69D99;
      --border:     rgba(200,149,103,0.18);
      --border-warm:rgba(200,149,103,0.35);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }

    /* ── PHOTO BACKGROUND ── */
    .bg-photo {
      position: fixed;
      inset: 0;
      background: url('photo.jpg') center 18% / cover no-repeat;
      z-index: 0;
    }

    /* layered overlay — dark top/bottom, lets midtone breathe,
       subtle burgundy warmth at base, cool slate hint at top */
    .bg-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(19,13,11,0.78) 0%,
          rgba(19,13,11,0.28) 32%,
          rgba(86,43,37,0.22) 58%,
          rgba(19,13,11,0.88) 100%
        );
    }

    /* grain */
    .bg-grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 1.5rem 4rem;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      max-width: 680px;
      padding: 3.2rem 0 0;
      text-align: center;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 9vw, 4.6rem);
      letter-spacing: 0.14em;
      color: var(--cream);
      line-height: 1;
      text-shadow: 0 2px 28px rgba(19,13,11,0.7);
    }

    /* ampersand picks up the copper tone from the photo */
    .wordmark span { color: var(--copper); }

    .tagline {
      margin-top: 0.85rem;
      font-size: 0.68rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* the third tagline segment — "From life, with love" — gets warmth */
    .tagline em {
      font-style: normal;
      color: var(--copper-lt);
    }

    /* ── DIVIDER — terracotta pulse ── */
    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--terra), var(--copper), var(--terra), transparent);
      margin: 2.4rem auto;
      opacity: 0.7;
    }

    /* ── SONG BLOCK ── */
    .song-label {
      font-size: 0.63rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 0.9rem;
    }

    .song-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(2rem, 7.5vw, 3.6rem);
      letter-spacing: 0.04em;
      text-align: center;
      color: var(--cream);
      line-height: 1.1;
      text-shadow: 0 2px 24px rgba(19,13,11,0.7);
      margin-bottom: 0.35rem;
    }

    .song-sub {
      text-align: center;
      font-size: 0.76rem;
      color: var(--terra);
      letter-spacing: 0.2em;
      margin-bottom: 1.8rem;
      opacity: 0.85;
    }

    /* ── EMBED — glass with warm tint ── */
    .embed-wrap {
      width: 100%;
      max-width: 540px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border-warm);
      background: rgba(86,43,37,0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      margin: 0 auto 2rem;
      box-shadow: 0 8px 40px rgba(19,13,11,0.5), inset 0 1px 0 rgba(219,206,195,0.08);
    }

    .embed-wrap iframe {
      display: block;
      width: 100%;
      border: none;
    }

    /* ── STORY ── */
    .story {
      max-width: 420px;
      margin: 0 auto;
      text-align: center;
    }

    .story p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.05rem, 3.2vw, 1.22rem);
      line-height: 1.95;
      color: rgba(237,224,212,0.68);
      text-shadow: 0 1px 10px rgba(19,13,11,0.5);
    }

    /* the punchline — copper glow */
    .story p em {
      font-style: normal;
      color: var(--copper);
    }

    /* ── LINKS ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      width: 100%;
      max-width: 370px;
      margin: 0 auto;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      padding: 0.95rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 400;
      transition: all 0.28s ease;
      border: 1px solid var(--border);
      color: var(--cream);
      background: rgba(19,13,11,0.42);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    /* warm shimmer on hover */
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(138,89,61,0.18), rgba(200,149,103,0.08), transparent);
      opacity: 0;
      transition: opacity 0.28s ease;
    }

    .link-btn:hover {
      border-color: var(--border-warm);
      color: var(--copper-lt);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(86,43,37,0.3);
    }

    .link-btn:hover::before { opacity: 1; }

    /* Spotify — primary, warmest */
    .link-btn.primary {
      background: rgba(86,43,37,0.28);
      border-color: rgba(200,149,103,0.4);
      color: var(--copper-lt);
      box-shadow: 0 4px 20px rgba(86,43,37,0.2);
    }

    .link-btn.primary:hover {
      background: rgba(138,89,61,0.38);
      box-shadow: 0 8px 32px rgba(86,43,37,0.4);
    }

    /* Apple Music — cool slate tint */
    .link-btn.apple {
      border-color: rgba(109,119,140,0.28);
    }
    .link-btn.apple:hover {
      border-color: rgba(109,119,140,0.55);
      color: #c8cdd8;
      box-shadow: 0 6px 24px rgba(59,60,75,0.35);
    }

    .link-icon {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      fill: currentColor;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 3.5rem;
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      color: rgba(138,89,61,0.35);
      text-transform: uppercase;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-1 { animation: fadeUp 1s ease both; animation-delay: 0.08s; }
    .fade-2 { animation: fadeUp 1s ease both; animation-delay: 0.22s; }
    .fade-3 { animation: fadeUp 1s ease both; animation-delay: 0.38s; }
    .fade-4 { animation: fadeUp 1s ease both; animation-delay: 0.54s; }
    .fade-5 { animation: fadeUp 1s ease both; animation-delay: 0.70s; }
    .fade-6 { animation: fadeUp 1s ease both; animation-delay: 0.86s; }
  </style>
</head>

  <div class="bg-grain"></div>
